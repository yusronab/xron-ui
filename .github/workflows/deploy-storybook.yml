name: Deploy Storybook

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build React package
        run: pnpm --filter ./packages/react build

      - name: Build React Storybook
        run: pnpm --filter storybook build-storybook

      - name: Build Vue package
        run: pnpm --filter ./packages/vue build

      - name: Build Vue Storybook
        run: pnpm --filter storybook-vue build-storybook

      - name: Build Angular package
        run: pnpm --filter ./packages/angular build

      - name: Build Angular Storybook
        run: pnpm --filter storybook-angular build-storybook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
